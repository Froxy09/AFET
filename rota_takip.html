<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A.F.E.T. :: Marmara Bölge Komuta Terminali v2.0</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root[data-theme="dark"] {
      --bg-root: #010812; --bg-panel: #020f1f; --border: #0a2a45;
      --accent: #00f2ff; 
      --route-blue: #000080; /* Lacivert */
      --route-green: #5ac591; /* Koyu Yeşil */
      --critical: #b30000; /* Koyu Kırmızı */
      --success: #008f4c;  /* Koyu Yeşil */
      --text-primary: #e0f7ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg-root); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; }

    #app { display: flex; flex-direction: column; height: 100vh; gap: 1px; background: var(--border); }
    
    #header { 
      background: #00060f; border-bottom: 2px solid var(--border); 
      display: flex; align-items: center; justify-content: space-between; 
      padding: 0 20px; height: 10vh;
    }
    
    .nav-back-btn {
      background: transparent; border: 1px solid var(--border); color: var(--accent);
      padding: 6px 14px; font-family: 'Share Tech Mono'; font-size: 0.8rem;
      cursor: pointer; margin-right: 20px; display: flex; align-items: center; gap: 8px;
      transition: all 0.3s; text-decoration: none; letter-spacing: 1px;
    }
    .nav-back-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); border-color: #fff; }

    #main { display: flex; flex: 1; gap: 1px; overflow: hidden; position: relative; }
    .col { display: flex; flex-direction: column; background: var(--bg-panel); }
    .col-left { flex: 0 0 35%; border-right: 1px solid var(--border); }
    .col-center { flex: 1; }
    
    .col-header { padding: 8px 12px; background: #010812; border-bottom: 2px solid var(--border); font-family: 'Orbitron'; font-size: 0.7rem; color: var(--accent); letter-spacing: 1px; }
    .map-wrapper { flex: 1; position: relative; }
    .map-container { width: 100%; height: 100%; background: #010812 !important; }

    .header-logo-badge {
      background: var(--critical); padding: 8px 15px; font-family: 'Orbitron'; font-weight: 900; 
      font-size: 1.2rem; border: 2px solid #fff; box-shadow: 0 0 10px var(--critical); margin-right: 15px;
    }

    .header-title-text { font-family: 'Orbitron'; font-size: 1.4rem; letter-spacing: 2px; font-weight: 900; }
    #clock { font-family: 'Share Tech Mono'; color: var(--accent); font-size: 1.5rem; font-weight: bold; }

    #info-box {
      position: absolute; bottom: 20px; right: 20px; width: 280px;
      background: rgba(1, 12, 26, 0.9); border: 1px solid var(--accent);
      padding: 15px; z-index: 3000; border-radius: 4px;
    }
    .box-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; font-weight: 700; }
    .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-family: 'Share Tech Mono'; font-size: 0.75rem; }
    .color-sample { width: 14px; height: 14px; border-radius: 2px; }
  </style>
</head>
<body>

<div id="app">
  <header id="header">
    <div style="display:flex; align-items:center;">
      <a href="/menu.html" class="nav-back-btn"><span>&lt;</span> GERİ DÖN</a>
      <div class="header-logo-badge">A.F.E.T.</div>
      <div>
        <div class="header-title-text">KOMUTA MERKEZİ // <span style="color:var(--accent)">İSTANBUL</span></div>
        <div style="font-size: 0.7rem; color: var(--accent); letter-spacing: 1px;">GÖRÜNTÜ İŞLEME VE ANALİZ TERMİNALİ</div>
      </div>
    </div>
    <div id="clock">--:--:-- UTC</div>
  </header>

  <div id="main">
    <div class="col col-left">
      <div class="col-header">01 // BÖLGESEL HASAR ANALİZİ</div>
      <div class="map-wrapper"><div id="mapDamage" class="map-container"></div></div>
    </div>
    
    <div class="col col-center">
      <div class="col-header">02 // OPERASYONEL ROTA VE LOJİSTİK</div>
      <div class="map-wrapper">
        <div id="mapRoute" class="map-container"></div>
        <div id="info-box">
          <div class="box-title">SİSTEM GÖSTERGELERİ</div>
          <div class="legend-item"><div class="color-sample" style="background: var(--critical); border: 1px solid #fff;"></div><span>KRİTİK ENKAZ BÖLGESİ</span></div>
          <div class="legend-item"><div class="color-sample" style="background: var(--success); border: 1px solid #fff;"></div><span>TOPLANMA ALANI</span></div>
          <div class="legend-item"><div style="width:20px; height:4px; background:var(--route-blue);"></div><span>ANA İKMAL HATTI (LACİVERT)</span></div>
          <div class="legend-item"><div style="width:20px; height:4px; background:var(--route-green);"></div><span>ACİL MÜDAHALE (YEŞİL)</span></div>
          <div style="margin-top: 10px; font-size: 0.7rem; color: var(--accent); font-family: 'Share Tech Mono';">● A.F.E.T. VERİ AKIŞI: AKTİF</div>
        </div>
      </div>
    </div>
  </div>
</div>

// --- HARİTA BAŞLATMA ---
function initMap(id) {
    const map = L.map(id, {
        center: [41.008, 28.970],
        zoom: 14,
        zoomControl: false,
        attributionControl: false
    });

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    
    // Karanlık Maskeleme
    L.polygon([worldCoords, marmaraHole], { 
      fillColor: '#010812', fillOpacity: 1, color: '#010812', weight: 0, interactive: false 
    }).addTo(map);

    return map;
}

const mapDamage = initMap('mapDamage');
const mapRoute = initMap('mapRoute');

// Stiller (v1.0'dan v2.0 renklerine uyarlandı)
const blueStyle = { color: '#000080', weight: 6, opacity: 0.9, lineJoin: 'round' };
const greenStyle = { color: '#5ac591', weight: 6, opacity: 0.9, lineJoin: 'round' };
const redZoneOpts = { color: '#b30000', fillColor: '#b30000', fillOpacity: 0.6, weight: 2 };
const greenZoneOpts = { color: '#008f4c', fillColor: '#a6fbd2', fillOpacity: 0.5, weight: 2 };

// Verileri Her İki Haritaya Ekle
RED_POLYGONS.forEach(z => {
    L.polygon(z, redZoneOpts).addTo(mapDamage);
    L.polygon(z, redZoneOpts).addTo(mapRoute);
});

GREEN_POLYGONS.forEach(z => {
    L.polygon(z, greenZoneOpts).addTo(mapDamage);
    L.polygon(z, greenZoneOpts).addTo(mapRoute);
});

// Rotaları Sadece Rota Haritasına Ekle
BLUE_ROUTES.forEach(r => L.polyline(r, blueStyle).addTo(mapRoute));
GREEN_ROUTES.forEach(r => L.polyline(r, greenStyle).addTo(mapRoute));

// --- SENKRONİZASYON ---
mapDamage.on('move', () => {
    mapRoute.setView(mapDamage.getCenter(), mapDamage.getZoom(), { animate: false });
});
mapRoute.on('move', () => {
    mapDamage.setView(mapRoute.getCenter(), mapRoute.getZoom(), { animate: false });
});

// --- SAAT ---
setInterval(() => { 
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR') + " UTC"; 
}, 1000);

</body>
</html>
